version: "3.9"

services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: psrl
      POSTGRES_PASSWORD: psrl
      POSTGRES_DB: psrl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psrl"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    command: python bot/telegram_bot.py
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - api

  worker:
    build: .
    command: python worker/worker.py
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - api

volumes:
  pgdata:
